<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EKIPA GRAT TO - System v9.2 AI GPS</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --bg-body: #18191a; --bg-card: #242526; --text-main: #e4e6eb; --accent: #2d88ff; --secondary: #45bd62; --input-bg: #3a3b3c; --danger: #ff4757; --warning: #f39c12; }
        [data-theme="light"] { --bg-body: #f0f2f5; --bg-card: #ffffff; --text-main: #1c1e21; --accent: #1877f2; --secondary: #42b72a; --input-bg: #f0f2f5; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; padding: 10px; transition: 0.3s; }
        #lock-screen { position: fixed; inset: 0; background: #1877f2; display: flex; align-items: center; justify-content: center; z-index: 9999; color: white; flex-direction: column; }
        .pass-box { background: var(--bg-card); padding: 30px; border-radius: 15px; color: var(--text-main); text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        
        #app { display: none; grid-template-columns: 1fr 380px; gap: 20px; max-width: 1400px; margin: 0 auto; }
        @media (max-width: 900px) { #app { grid-template-columns: 1fr; } .list-panel { order: 2; } }

        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; grid-column: span 2; overflow-x: auto; padding-bottom: 5px; }
        .nav-btn { padding: 12px 24px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: var(--bg-card); color: var(--text-main); transition: 0.2s; white-space: nowrap; }
        .nav-btn.active { background: var(--accent); color: white; transform: translateY(-2px); }
        
        .card { background: var(--bg-card); padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .view-section { display: none; }
        .view-section.active { display: block; }

        .settings-bar { font-size: 12px; padding: 15px; background: rgba(45, 136, 255, 0.1); border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--accent); display: flex; gap: 15px; align-items: center; justify-content: center; flex-wrap: wrap; }
        .settings-bar input { width: 65px; padding: 6px; background: #111; border: 1px solid #444; color: #fff; border-radius: 6px; text-align: center; }

        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        label { display: block; font-size: 11px; font-weight: 900; margin-bottom: 4px; margin-top: 10px; color: var(--accent); text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid #444; border-radius: 10px; background: var(--input-bg); color: var(--text-main); font-size: 14px; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button.action { padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 13px; transition: 0.2s; text-transform: uppercase; }
        .btn-calc { background: var(--accent); color: white; grid-column: span 2; font-size: 16px; }
        .btn-save { background: var(--secondary); color: white; grid-column: span 2; }
        .btn-gps { background: #ea4335; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        
        .ai-dist-btn { background: #4285f4; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 8px; width: 100%; font-size: 13px; transition: 0.3s; }

        .item { background: var(--bg-card); padding: 18px; margin-bottom: 15px; border-radius: 15px; border-left: 8px solid var(--accent); position: relative; }
        .item.done { border-left-color: var(--secondary); }
        .btn-status { width: 100%; padding: 15px; border-radius: 10px; border: none; cursor: pointer; margin-top: 15px; font-weight: 800; color: white; }
        .status-wait { background: #444; }
        .status-done { background: var(--secondary) !important; }
        .btn-del-corner { color: var(--danger); cursor: pointer; position: absolute; right: 15px; top: 15px; font-size: 20px; }

        .crew-picker { display: flex; flex-wrap: wrap; gap: 8px; background: var(--input-bg); padding: 12px; border-radius: 10px; border: 1px solid #444; }
        .crew-opt { padding: 8px 16px; background: #444; border-radius: 20px; font-size: 13px; cursor: pointer; }
        .crew-opt.selected { background: var(--accent); color: white; }
        .crew-tag { background: var(--accent); color: white; padding: 3px 8px; border-radius: 6px; font-size: 11px; margin-right: 5px; font-weight: bold; }

        #edit-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--bg-card); width: 95%; max-width: 550px; padding: 30px; border-radius: 20px; position: relative; }
        #toast { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: var(--secondary); color: white; padding: 15px 35px; border-radius: 40px; display: none; z-index: 10001; font-weight: bold; }
        #pdf-template { position: absolute; left: -9999px; top: 0; width: 800px; background: white; color: black; padding: 60px; }
    </style>
</head>
<body data-theme="dark">

<div id="pdf-template">
    <div style="display: flex; justify-content: space-between; border-bottom: 5px solid #2d88ff; padding-bottom: 25px;">
        <div><h1 id="pdf-moja-firma" style="color: #2d88ff; margin:0; font-size: 32px;"></h1><p style="font-size: 18px; color: #555;">Profesjonalny Wywóz i Utylizacja</p></div>
        <div style="text-align: right"><h2>KOSZTORYS USŁUGI</h2><p id="pdf-data-dzis" style="font-weight: bold;"></p></div>
    </div>
    <div style="margin: 40px 0;">
        <h4 style="color: #2d88ff; border-bottom: 1px solid #eee; padding-bottom: 5px;">KLIENT / ADRES:</h4>
        <p id="pdf-klient-name" style="font-size: 22px; font-weight: bold; margin-top: 10px;"></p>
    </div>
    <table style="width: 100%; border-collapse: collapse; margin: 40px 0;">
        <thead><tr style="background: #f0f2f5;"><th style="padding:15px; border:1px solid #ddd; text-align:left;">ELEMENT WYCENY</th><th style="padding:15px; border:1px solid #ddd; text-align:right;">KWOTA</th></tr></thead>
        <tbody id="pdf-tabela-body"></tbody>
    </table>
    <div style="text-align: right; margin-top: 50px; padding: 25px; background: #f0f2f5; border-radius: 10px;">
        <h2 style="color: #2d88ff; margin: 0; font-size: 28px;">SUMA BRUTTO: <span id="pdf-total-suma"></span></h2>
    </div>
</div>

<div id="toast">✅ Zapisano pomyślnie!</div>
<div id="lock-screen"><div class="pass-box"><h2>🔐 PANEL OPERACYJNY</h2><input type="password" id="passInput" placeholder="Hasło" style="text-align:center;"><br><button class="action btn-calc" onclick="checkPass()" style="width:100%; margin-top:15px;">ZALOGUJ</button></div></div>

<div id="edit-modal">
    <div class="modal-content">
        <span style="position:absolute; right:25px; top:20px; cursor:pointer; font-size:28px;" onclick="closeModal()">×</span>
        <h2 style="color: var(--accent); margin-top:0;">Edycja Zlecenia</h2>
        <input type="hidden" id="edit-id">
        <div id="modal-fields" class="grid-inputs"></div>
        <div class="btn-group"><button class="action btn-save" onclick="updateZlecenie()">ZAPISZ ZMIANY</button></div>
    </div>
</div>

<div id="app">
    <div class="nav-tabs">
        <button class="nav-btn active" onclick="switchTab('calc')">🧮 Kalkulator</button>
        <button class="nav-btn" onclick="switchTab('schedule')">📅 Harmonogram</button>
        <button class="nav-btn" onclick="switchTab('stats')">📊 Statystyki</button>
        <button class="nav-btn" onclick="switchTab('crew')">👥 Pracownicy</button>
        <button class="nav-btn" onclick="toggleTheme()" style="margin-left: auto;">🌗</button>
    </div>

    <div class="left-col">
        <div id="view-calc" class="view-section active">
            <div class="card">
                <div class="settings-bar">
                    <b>⚙️ CENNIK:</b>
                    Os/h: <input type="number" id="p_os" value="80">
                    Tona: <input type="number" id="p_t" value="700">
                    KM: <input type="number" id="p_km" value="1.5">
                </div>

                <label>Nazwa firmy</label><input type="text" id="mojaFirma" value="EKIPA GRAT TO">
                <label>Klient</label><input type="text" id="klient" placeholder="Imię Nazwisko">
                <label>Adres Klienta</label>
                <input type="text" id="adres" placeholder="Ulica, Numer, Miasto">
                <button class="ai-dist-btn" id="btn-calc-dist" onclick="calculateDistanceAI()">🤖 OBLICZ TRASĘ (GPS: Baza -> Klient -> PSZOK -> Baza)</button>
                
                <div class="grid-inputs">
                    <div><label>Data</label><input type="date" id="dataZlecenia"></div>
                    <div><label>Godzina</label><input type="time" id="godzinaZlecenia" value="08:00"></div>
                    <div style="grid-column: span 2;"><label>Ekipa</label><div id="crew-selector-main" class="crew-picker"></div></div>
                    <div><label>Praca (h)</label><input type="number" id="h" value="2"></div>
                    <div><label>Waga (t)</label><input type="number" id="w" value="1" step="0.1"></div>
                    <div><label>Trasa (km)</label><input type="number" id="km" value="10"></div>
                    <div><label>Czas auta (h)</label><input type="number" id="ah" value="1"></div>
                    <div><label>Piętro</label><input type="number" id="p" value="0"></div>
                    <div><label>Winda</label><select id="winda"><option value="1">JEST</option><option value="0">BRAK</option></select></div>
                </div>
                
                <div class="btn-group">
                    <button class="action btn-calc" onclick="oblicz()">PRZELICZ</button>
                    <button class="action btn-save" onclick="zapisz()">ZAPISZ DO BAZY</button>
                    <button class="action btn-clear" onclick="wyczysc()">CZYŚĆ FORMULARZ</button>
                    <button class="action btn-pdf" onclick="drukuj()">GENERUJ PDF</button>
                </div>

                <div style="text-align: center; margin-top: 25px; padding: 20px; border: 3px solid var(--accent); border-radius: 15px; background: rgba(0,0,0,0.1);">
                    <div style="font-size: 36px; font-weight: 900; color: var(--accent);" id="suma">0.00 PLN</div>
                    <div id="zysk_os" style="color: var(--secondary); font-weight: bold; margin-top:8px;"></div>
                    <div style="height: 150px; margin-top:20px;"><canvas id="chart"></canvas></div>
                </div>
            </div>
        </div>

        <div id="view-schedule" class="view-section">
            <div class="card"><h2>📅 Harmonogram & Nawigacja</h2><div id="schedule-list"></div></div>
        </div>

        <div id="view-stats" class="view-section">
            <div class="card">
                <div class="stats-grid" style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; text-align:center;">
                    <div class="card"><div class="stat-val" id="st-obrot">0 zł</div><small>Przychód</small></div>
                    <div class="card"><div class="stat-val" id="st-zysk-laczny" style="color:var(--secondary)">0 zł</div><small>Zysk</small></div>
                    <div class="card"><div class="stat-val" id="st-ile">0</div><small>Ilość</small></div>
                </div>
                <div id="raport-podsumowanie" class="raport-text" style="background:rgba(0,0,0,0.2); padding:15px; border-radius:10px; margin-top:10px;"></div>
            </div>
        </div>

        <div id="view-crew" class="view-section">
            <div class="card">
                <h2>👥 Baza Pracowników</h2>
                <div style="display: flex; gap: 10px;"><input type="text" id="newCrewName" placeholder="Imię..."><button class="action btn-save" onclick="dodajPracownika()">DODAJ</button></div>
                <div id="crew-list-full" style="margin-top:20px;"></div>
            </div>
        </div>
    </div>
    
    <div class="list-panel"><h3>HISTORIA</h3><div id="cloud-list"></div></div>
</div>

<script>
    // --- KONFIGURACJA GPS & BAZY ---
    const GOOGLE_KEY = "AIzaSyDlos1sVs8-fsMSYb83dOC2tTlqBX0r_4I";
    const BAZA_ADRES = "Górczewska 224, Warszawa";
    const PSZOK_POINTS = ["Tatarska 2/4, Warszawa", "Kampinoska 1, Warszawa"];
    const TAJNE_HASLO = "1234";

    let lastSnapData = [], workers = [], selectedWorkers = [];
    let myChart = null;

    const firebaseConfig = {
        apiKey: "AIzaSyB_e0N5Gx5I9ADbCwzTmz-dQUtZ3hetzLw",
        authDomain: "kalkulator-ekipy.firebaseapp.com",
        projectId: "kalkulator-ekipy",
        storageBucket: "kalkulator-ekipy.firebasestorage.app",
        messagingSenderId: "988124606603",
        appId: "1:988124606603:web:1f1b932d7283ac4a0b648e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- FUNKCJA OBLICZANIA TRASY AI ---
    async function calculateDistanceAI() {
        const clientAddr = document.getElementById('adres').value;
        if(!clientAddr) return alert("Najpierw wpisz adres klienta!");
        
        const btn = document.getElementById('btn-calc-dist');
        btn.innerText = "⌛ SZUKAM NAJKRÓTSZEJ DROGI...";
        btn.disabled = true;
// Używamy darmowego proxy, aby ominąć błąd CORS
    const proxyUrl = "https://corsproxy.io/?";
        
        try {
            let bestTotalKm = 9999;
            
            // Pętla sprawdzająca, który PSZOK jest "po drodze" lub bliżej
            for(let pszok of PSZOK_POINTS) {
                const stops = [BAZA_ADRES, clientAddr, pszok, BAZA_ADRES];
                let totalMeters = 0;

                for(let i=0; i < stops.length - 1; i++) {


                    const googleUrl = `https://maps.googleapis.com/maps/api/distancematrix/json?origins=${encodeURIComponent(stops[i])}&destinations=${encodeURIComponent(stops[i+1])}&key=${GOOGLE_KEY}`;
                
                    const resp = await fetch(proxyUrl + encodeURIComponent(googleUrl));
                    const data = await resp.json();
                    
                    //const url = `https://maps.googleapis.com/maps/api/distancematrix/json?origins=${encodeURIComponent(stops[i])}&destinations=${encodeURIComponent(stops[i+1])}&key=${GOOGLE_KEY}`;
                    //const resp = await fetch(url);
                   // const data = await resp.json();
                    
                    if(data.rows[0].elements[0].status === "OK") {
                        totalMeters += data.rows[0].elements[0].distance.value;
                    } else {
                        throw new Error("Adres nieznany dla Google");
                    }
                }
                
                let currentKm = totalMeters / 1000;
                if(currentKm < bestTotalKm) bestTotalKm = currentKm;
            }

            document.getElementById('km').value = Math.round(bestTotalKm);
            btn.innerText = `✅ TRASA: ${Math.round(bestTotalKm)} KM`;
            oblicz();
        } catch(e) {
            alert("Błąd Google Maps. Sprawdź czy profil płatności jest aktywny i adres poprawny.");
            btn.innerText = "🤖 OBLICZ TRASĘ PONOWNIE";
        } finally {
            btn.disabled = false;
        }
    }

    // --- NAWIGACJA Z BAZY DO KLIENTA ---
    function openNav(addr) { 
        const url = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(BAZA_ADRES)}&destination=${encodeURIComponent(addr)}&travelmode=driving`;
        window.open(url, '_blank'); 
    }

    // --- SYSTEM LOGOWANIA ---
    function checkPass() {
        if(document.getElementById('passInput').value === TAJNE_HASLO) {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('app').style.display = 'grid';
            document.getElementById('dataZlecenia').valueAsDate = new Date();
            initWorkers(); oblicz();
        } else alert("Błędne hasło!");
    }

    // --- ZARZĄDZANIE PRACOWNIKAMI ---
    function initWorkers() {
        db.collection("pracownicy").onSnapshot(snap => {
            workers = []; snap.forEach(doc => workers.push({ id: doc.id, ...doc.data() }));
            renderCrewPickers(); renderCrewListFull();
        });
    }

    function renderCrewPickers() {
        const el = document.getElementById('crew-selector-main'); el.innerHTML = "";
        workers.forEach(w => {
            const opt = document.createElement('div'); opt.className = `crew-opt ${selectedWorkers.includes(w.name) ? 'selected' : ''}`;
            opt.innerText = w.name; opt.onclick = () => {
                if(selectedWorkers.includes(w.name)) selectedWorkers = selectedWorkers.filter(n => n !== w.name);
                else selectedWorkers.push(w.name);
                renderCrewPickers(); oblicz();
            };
            el.appendChild(opt);
        });
    }

    function renderCrewListFull() {
        const el = document.getElementById('crew-list-full'); el.innerHTML = "";
        workers.forEach(w => { el.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; padding:15px; margin-bottom:10px;"><b>${w.name}</b><button class="action" onclick="usunPracownika('${w.id}')" style="background:var(--danger); color:white; border:none; border-radius:5px; cursor:pointer; padding:5px 10px;">USUŃ</button></div>`; });
    }

    async function dodajPracownika() {
        const name = document.getElementById('newCrewName').value; if(!name) return;
        await db.collection("pracownicy").add({ name }); document.getElementById('newCrewName').value = "";
    }
    async function usunPracownika(id) { if(confirm("Usunąć pracownika?")) await db.collection("pracownicy").doc(id).delete(); }

    // --- MATEMATYKA WYCENY ---
    function oblicz(source = "") {
        const prefix = source === "modal" ? "m-" : "";
        const r = { os: parseFloat(document.getElementById('p_os').value)||80, t: parseFloat(document.getElementById('p_t').value)||700, km: parseFloat(document.getElementById('p_km').value)||1.5 };
        const h = parseFloat(document.getElementById(prefix + 'h').value)||0, w = parseFloat(document.getElementById(prefix + 'w').value)||0, km = parseFloat(document.getElementById(prefix + 'km').value)||0;
        const ah = parseFloat(document.getElementById(prefix + 'ah').value)||0, p = parseFloat(document.getElementById(prefix + 'p').value)||0, winda = parseInt(document.getElementById(prefix + 'winda').value);
        const ek = source === "modal" ? (document.getElementById('m-imiona').value.split(',').filter(x=>x).length || 1) : Math.max(selectedWorkers.length, 1);
        const names = source === "modal" ? document.getElementById('m-imiona').value : selectedWorkers.join(', ');

        const c_utyl = w * r.t, c_trans = (ah * 50) + (km * r.km), c_praca = ek * (h * (1 + (0.2 * p * (1 - winda)))) * r.os, total = c_utyl + c_trans + c_praca;
        
        if(source !== "modal") {
            document.getElementById('suma').innerText = total.toFixed(2) + " PLN";
            document.getElementById('zysk_os').innerText = `Zysk / głowę: ${(c_praca/ek).toFixed(2)} zł`;
            drawDonutChart(c_utyl + c_trans, c_praca);
        }
        return { total, c_utyl, c_trans, c_praca, ek, imiona: names, h, w, km, ah, p, winda, klient: document.getElementById(prefix + 'klient').value, adres: document.getElementById(prefix + 'adres').value, d_zlec: document.getElementById(prefix + 'dataZlecenia').value, g_zlec: document.getElementById(prefix + 'godzinaZlecenia').value, timestamp: Date.now() };
    }

    function drawDonutChart(k, z) {
        const ctx = document.getElementById('chart').getContext('2d'); if(myChart) myChart.destroy();
        myChart = new Chart(ctx, { type: 'doughnut', data: { labels: ['Koszty', 'Zysk'], datasets: [{ data: [k, z], backgroundColor: ['#ff4757', '#2ecc71'], borderWidth: 0 }] }, options: { plugins: { legend: { display: false } }, maintainAspectRatio: false, cutout: '70%' } });
    }

    // --- OPERACJE NA BAZIE DANYCH ---
    async function zapisz() {
        const d = oblicz(); if(!d.klient || !d.adres) return alert("Uzupełnij klienta i adres!");
        await db.collection("zamowienia").add({ ...d, done: false }); showToast(); wyczysc();
    }

    db.collection("zamowienia").orderBy("timestamp", "desc").onSnapshot(snap => {
        const list = document.getElementById('cloud-list'); list.innerHTML = ""; lastSnapData = [];
        snap.forEach(doc => {
            const z = doc.data(); z.id = doc.id; lastSnapData.push(z);
            const tags = z.imiona ? z.imiona.split(',').map(n => `<span class="crew-tag">${n.trim()}</span>`).join('') : '';
            const div = document.createElement('div'); div.className = `item ${z.done ? 'done' : ''}`;
            div.innerHTML = `<div class="btn-del-corner" onclick="usun('${doc.id}')">×</div>
                <div onclick='openEditModal("${doc.id}", ${JSON.stringify(z)})' style="cursor:pointer">
                    <b>${z.klient}</b><br><small>${z.adres}</small><br><small>${z.d_zlec} | ${z.total.toFixed(0)} zł</small><br>${tags}
                </div>
                <button class="btn-gps" onclick="openNav('${z.adres}')">📍 PROWADŹ DO KLIENTA</button>
                <button class="btn-status ${z.done ? 'status-done' : 'status-wait'}" onclick="toggleDone('${doc.id}', ${z.done})">${z.done ? '✅ GOTOWE' : '⏳ W TRAKCIE'}</button>`;
            list.appendChild(div);
        });
        updateStatsCharts(); updateSchedule();
    });

    async function toggleDone(id, s) { await db.collection("zamowienia").doc(id).update({ done: !s }); }
    async function usun(id) { if(confirm("Usunąć zlecenie?")) await db.collection("zamowienia").doc(id).delete(); }

    function openEditModal(id, z) {
        document.getElementById('edit-id').value = id;
        document.getElementById('modal-fields').innerHTML = `
            <div style="grid-column: span 2;"><label>Klient</label><input type="text" id="m-klient" value="${z.klient}"></div>
            <div style="grid-column: span 2;"><label>Adres</label><input type="text" id="m-adres" value="${z.adres||''}"></div>
            <div style="grid-column: span 2;"><label>Ekipa</label><input type="text" id="m-imiona" value="${z.imiona||''}"></div>
            <div><label>h</label><input type="number" id="m-h" value="${z.h}"></div>
            <div><label>t</label><input type="number" id="m-w" value="${z.w}"></div>
            <div><label>km</label><input type="number" id="m-km" value="${z.km}"></div>
            <div><label>Data</label><input type="date" id="m-dataZlecenia" value="${z.d_zlec}"></div>
            <input type="hidden" id="m-ah" value="${z.ah||1}"><input type="hidden" id="m-p" value="${z.p||0}"><input type="hidden" id="m-winda" value="${z.winda||1}"><input type="hidden" id="m-godzinaZlecenia" value="${z.g_zlec}">`;
        document.getElementById('edit-modal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }
    async function updateZlecenie() { await db.collection("zamowienia").doc(document.getElementById('edit-id').value).update(oblicz("modal")); closeModal(); showToast(); }
    
    function wyczysc() { document.getElementById('klient').value = ""; document.getElementById('adres').value = ""; selectedWorkers = []; renderCrewPickers(); document.getElementById('btn-calc-dist').innerText = "🤖 OBLICZ TRASĘ (GPS)"; oblicz(); }
    function showToast() { document.getElementById('toast').style.display='block'; setTimeout(()=>document.getElementById('toast').style.display='none',3000); }
    function switchTab(tab) { document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active')); document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); document.getElementById('view-' + tab).classList.add('active'); event.currentTarget.classList.add('active'); }

    function updateStatsCharts() {
        let obrot = 0, zysk = 0, ile = 0;
        lastSnapData.filter(z => z.done).forEach(z => { obrot += z.total; zysk += z.c_praca; ile++; });
        document.getElementById('st-obrot').innerText = obrot.toFixed(0) + " zł"; 
        document.getElementById('st-zysk-laczny').innerText = zysk.toFixed(0) + " zł"; 
        document.getElementById('st-ile').innerText = ile;
        document.getElementById('raport-podsumowanie').innerHTML = `Średnio: <b>${ile>0?(obrot/ile).toFixed(0):0} zł</b>. Łączny zysk ekipy: <b>${zysk.toFixed(0)} zł</b>.`;
    }

    function updateSchedule() {
        const el = document.getElementById('schedule-list'); el.innerHTML = "";
        lastSnapData.filter(z => !z.done).sort((a,b)=> new Date(a.d_zlec)-new Date(b.d_zlec)).forEach(z => { 
            el.innerHTML += `<div class="item" style="border-left-color: var(--warning);">
                <b>${z.klient}</b><br><small>${z.d_zlec} o ${z.g_zlec}</small><br>📍 ${z.adres}
                <button class="btn-gps" onclick="openNav('${z.adres}')">JEDŹ DO KLIENTA</button>
            </div>`; 
        });
    }

    function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }

    // --- GENERATOR PDF ---
    async function drukuj() {
        const d = oblicz(); 
        document.getElementById('pdf-moja-firma').innerText = document.getElementById('mojaFirma').value; 
        document.getElementById('pdf-klient-name').innerText = d.klient + " | " + d.adres; 
        document.getElementById('pdf-data-dzis').innerText = new Date().toLocaleDateString(); 
        document.getElementById('pdf-total-suma').innerText = d.total.toFixed(2) + " PLN"; 
        document.getElementById('pdf-tabela-body').innerHTML = `
            <tr><td style="padding:15px; border:1px solid #ddd;">Koszt robocizny</td><td style="padding:15px; border:1px solid #ddd; text-align:right;">${d.c_praca.toFixed(2)} zł</td></tr>
            <tr><td style="padding:15px; border:1px solid #ddd;">Utylizacja odpadów (${d.w}t)</td><td style="padding:15px; border:1px solid #ddd; text-align:right;">${d.c_utyl.toFixed(2)} zł</td></tr>
            <tr><td style="padding:15px; border:1px solid #ddd;">Transport i logistyka (${d.km}km)</td><td style="padding:15px; border:1px solid #ddd; text-align:right;">${d.c_trans.toFixed(2)} zł</td></tr>`;
        const canvas = await html2canvas(document.getElementById('pdf-template'), { scale: 2 });
        const pdf = new jspdf.jsPDF('p', 'mm', 'a4');
        pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, (canvas.height * 210) / canvas.width);
        window.open(URL.createObjectURL(pdf.output('blob')), '_blank');
    }
</script>
</body>
</html>
