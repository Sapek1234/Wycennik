<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert PRO - Cloud System</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg-body: #f4f7f6; --bg-card: #ffffff; --text-main: #333333; --accent: #1a73e8; --input-bg: #ffffff; }
        [data-theme="dark"] { --bg-body: #121212; --bg-card: #1e1e1e; --text-main: #e0e0e0; --accent: #4dadff; --input-bg: #2d2d2d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-body); color: var(--text-main); display: flex; justify-content: center; padding: 20px; transition: 0.3s; margin: 0; }
        .main-container { display: flex; gap: 20px; width: 100%; max-width: 1050px; align-items: flex-start; flex-wrap: wrap; }
        .card { background: var(--bg-card); padding: 25px; border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); flex: 1.5; min-width: 320px; }
        .library-panel { background: var(--bg-card); padding: 20px; border-radius: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); flex: 0.9; min-width: 300px; max-height: 90vh; overflow-y: auto; }
        .theme-switch { float: right; cursor: pointer; background: var(--accent); color: white; border: none; padding: 6px 12px; border-radius: 15px; font-size: 11px; font-weight: bold; }
        label { display: block; margin-top: 8px; font-size: 13px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 6px; background: var(--input-bg); color: var(--text-main); box-sizing: border-box; }
        .btn-group { margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .action-btn { padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .btn-calc { background: var(--accent); color: white; grid-column: span 2; }
        .btn-save { background: #f39c12; color: white; grid-column: span 2; }
        .btn-invoice { background: #202124; color: white; }
        .btn-pdf { background: #34a853; color: white; }
        .result-box { margin-top: 20px; padding: 15px; background: rgba(26, 115, 232, 0.05); border-radius: 8px; border: 1px solid var(--accent); text-align: center; }
        .price-total { font-size: 32px; font-weight: bold; color: var(--accent); }
        .profit-status { margin-top: 8px; font-weight: bold; font-size: 14px; padding: 5px; border-radius: 5px; }
        .lib-item { border-bottom: 1px solid #ddd; padding: 12px 0; display: flex; justify-content: space-between; align-items: center; }
        .lib-info { cursor: pointer; flex: 1; }
        .del-btn { color: #e74c3c; cursor: pointer; font-size: 18px; padding: 5px 10px; }
        #invoice-template { display: none; }
        @media print {
            body { background: white !important; color: black !important; padding: 0; }
            .main-container, .theme-switch { display: none !important; }
            #invoice-template { display: block !important; width: 100%; }
            table { width: 100%; border-collapse: collapse; margin-top: 20px; }
            th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        }
    </style>
</head>
<body data-theme="light">

<div class="main-container">
    <div class="card">
        <button class="theme-switch" onclick="toggleTheme()" id="themeBtn">TRYB CIEMNY 🌙</button>
        <h2 style="margin:0;">Expert PRO Cloud</h2>
        <p style="font-size: 11px; margin-bottom: 20px;">Synchronizacja aktywna ☁️</p>
        
        <label>Twoja Firma:</label>
        <input type="text" id="myCompany" value="Firma Wywozowa">
        <label>Klient:</label>
        <input type="text" id="klient" placeholder="Imię, Nazwisko">

        <div style="display: flex; gap: 10px;">
            <div style="flex:1"><label>Czas (h):</label><input type="number" id="h" value="2"></div>
            <div style="flex:1"><label>Osoby:</label><input type="number" id="osoby" value="2"></div>
        </div>
        <div style="display: flex; gap: 10px;">
            <div style="flex:1"><label>Waga (t):</label><input type="number" id="w" value="1" step="0.1"></div>
            <div style="flex:1"><label>KM:</label><input type="number" id="km" value="10"></div>
        </div>
        <div style="display: flex; gap: 10px;">
            <div style="flex:1"><label>Czas auta:</label><input type="number" id="ah" value="1"></div>
            <div style="flex:1"><label>Piętro:</label><input type="number" id="p" value="0"></div>
        </div>
        <div style="display: flex; gap: 10px;">
            <div style="flex:1"><label>Winda:</label><select id="winda"><option value="1">TAK</option><option value="0">NIE</option></select></div>
            <div style="flex:1"><label>Płatność:</label><select id="metoda"><option>Gotówka</option><option>Przelew</option></select></div>
        </div>

        <div class="btn-group">
            <button class="action-btn btn-calc" onclick="oblicz()">PRZELICZ</button>
            <button class="action-btn btn-save" onclick="zapiszDoChmury()">☁️ ZAPISZ DLA WSZYSTKICH</button>
            <button class="action-btn btn-pdf" onclick="drukuj('oferta')">OFERTA PDF</button>
            <button class="action-btn btn-invoice" onclick="drukuj('faktura')">RACHUNEK PDF</button>
        </div>

        <div class="result-box">
            <div class="price-total" id="suma">0.00 PLN</div>
            <div id="zysk_info" style="font-weight:bold; color:#34a853; font-size: 14px;"></div>
            <div id="status" class="profit-status">---</div>
            <canvas id="myChart" style="max-height: 130px; margin-top:10px;"></canvas>
        </div>
    </div>

    <div class="library-panel">
        <h3 style="margin-top:0;">📚 Historia Zamówień</h3>
        <div id="lista-zamowien">Łączenie z bazą Google...</div>
    </div>
</div>

<div id="invoice-template">
    <h1 id="doc-title">RACHUNEK</h1>
    <p>Data: <span id="inv-date"></span></p>
    <p><strong>Wystawca:</strong> <span id="inv-seller"></span></p>
    <p><strong>Klient:</strong> <span id="inv-buyer"></span></p>
    <table>
        <thead><tr><th>Usługa</th><th>Wartość</th></tr></thead>
        <tbody id="inv-rows"></tbody>
    </table>
    <h2 style="text-align:right;">SUMA: <span id="inv-total"></span></h2>
</div>

<script>
    // TWOJA KONFIGURACJA
    const firebaseConfig = {
        apiKey: "AIzaSyB_e0N5Gx5I9ADbCwzTmz-dQUtZ3hetzLw",
        authDomain: "kalkulator-ekipy.firebaseapp.com",
        projectId: "kalkulator-ekipy",
        storageBucket: "kalkulator-ekipy.firebasestorage.app",
        messagingSenderId: "988124606603",
        appId: "1:988124606603:web:1f1b932d7283ac4a0b648e",
        measurementId: "G-NHBGZF8DQC"
    };

    // Inicjalizacja
    try {
        firebase.initializeApp(firebaseConfig);
        var db = firebase.firestore();
    } catch (e) {
        console.error("Błąd Firebase:", e);
    }
    
    let myChart = null;

    function toggleTheme() {
        const body = document.body;
        const isLight = body.getAttribute('data-theme') === 'light';
        body.setAttribute('data-theme', isLight ? 'dark' : 'light');
        document.getElementById('themeBtn').innerText = isLight ? 'TRYB JASNY ☀️' : 'TRYB CIEMNY 🌙';
    }

    function oblicz() {
        const h = parseFloat(document.getElementById('h').value) || 0;
        const os = parseInt(document.getElementById('osoby').value) || 1;
        const w = parseFloat(document.getElementById('w').value) || 0;
        const km = parseFloat(document.getElementById('km').value) || 0;
        const ah = parseFloat(document.getElementById('ah').value) || 0;
        const p = parseFloat(document.getElementById('p').value) || 0;
        const winda = parseInt(document.getElementById('winda').value);

        const mnoznik = 1 + (0.2 * p * (1 - winda));
        const k_utylizacja = w * 700;
        const k_transport = (ah * 49) + (km * 1.5);
        const k_praca = os * (h * mnoznik) * 80;
        const total = k_utylizacja + k_transport + k_praca;

        document.getElementById('suma').innerText = total.toFixed(2) + " PLN";
        document.getElementById('zysk_info').innerText = "Zysk na osobę: " + (k_praca/os).toFixed(2) + " PLN";
        
        const marza = total > 0 ? (k_praca / total) * 100 : 0;
        const s = document.getElementById('status');
        if(marza > 50) { s.innerText = "⭐ ZŁOTE ZLECENIE"; s.style.color = "#2ecc71"; s.style.background="rgba(46,204,113,0.1)"; }
        else if(marza > 30) { s.innerText = "✔️ DOBRA OPŁACALNOŚĆ"; s.style.color = "#f39c12"; s.style.background="rgba(243,156,18,0.1)"; }
        else { s.innerText = "⚠️ NISKA OPŁACALNOŚĆ"; s.style.color = "#e74c3c"; s.style.background="rgba(231,76,60,0.1)"; }

        updateChart(k_utylizacja + k_transport, k_praca);
        return { total, k_utylizacja, k_transport, k_praca, os, klient: document.getElementById('klient').value, h, w, km, ah, p, winda };
    }

    function updateChart(k, p) {
        const ctx = document.getElementById('myChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: ['Koszty', 'Zysk'], datasets: [{ data: [k, p], backgroundColor: ['#e74c3c', '#2ecc71'], borderWidth: 0 }] },
            options: { plugins: { legend: { position: 'bottom' } }, maintainAspectRatio: false }
        });
    }

    async function zapiszDoChmury() {
        const d = oblicz();
        if(!d.klient) return alert("BŁĄD: Wpisz nazwę klienta!");
        try {
            await db.collection("zamowienia").add({ 
                ...d, 
                data: new Date().toLocaleDateString(), 
                timestamp: Date.now() 
            });
            alert("✅ Zapisano pomyślnie w chmurze!");
        } catch (e) { 
            alert("❌ BŁĄD UPRAWNIEŃ: Upewnij się, że w Firebase kliknąłeś PUBLISH w zakładce Rules!"); 
        }
    }

    // POBIERANIE W CZASIE RZECZYWISTYM
    db.collection("zamowienia").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
        const list = document.getElementById('lista-zamowien');
        list.innerHTML = "";
        
        if (snapshot.empty) {
            list.innerHTML = "<p style='color:#888;'>Baza jest pusta. Dodaj pierwsze zlecenie.</p>";
            return;
        }

        snapshot.forEach((doc) => {
            const z = doc.data();
            const div = document.createElement('div');
            div.className = 'lib-item';
            const safeData = encodeURIComponent(JSON.stringify(z));
            div.innerHTML = `
                <div class="lib-info" onclick="wczytaj('${safeData}')">
                    <b>${z.klient}</b><br><small>${z.data} - ${z.total.toFixed(2)} PLN</small>
                </div>
                <div class="del-btn" onclick="usunZChmury('${doc.id}')">✖</div>`;
            list.appendChild(div);
        });
    }, (error) => {
        document.getElementById('lista-zamowien').innerHTML = "<b style='color:red'>Błąd bazy:</b> " + error.message;
    });

    function wczytaj(data) {
        const z = JSON.parse(decodeURIComponent(data));
        document.getElementById('klient').value = z.klient;
        document.getElementById('h').value = z.h;
        document.getElementById('osoby').value = z.os;
        document.getElementById('w').value = z.w;
        document.getElementById('km').value = z.km;
        document.getElementById('ah').value = z.ah;
        document.getElementById('p').value = z.p;
        document.getElementById('winda').value = z.winda;
        oblicz();
    }

    async function usunZChmury(id) {
        if(confirm("Usunąć to zlecenie z chmury?")) {
            await db.collection("zamowienia").doc(id).delete();
        }
    }

    function drukuj(typ) {
        const d = oblicz();
        document.getElementById('doc-title').innerText = typ === 'faktura' ? 'RACHUNEK' : 'OFERTA';
        document.getElementById('inv-date').innerText = new Date().toLocaleDateString();
        document.getElementById('inv-seller').innerText = document.getElementById('myCompany').value;
        document.getElementById('inv-buyer').innerText = d.klient || "................";
        document.getElementById('inv-total').innerText = d.total.toFixed(2) + " PLN";
        document.getElementById('inv-rows').innerHTML = `
            <tr><td>Utylizacja odpadów (${d.w} t)</td><td>${d.k_utylizacja.toFixed(2)} PLN</td></tr>
            <tr><td>Dojazd i transport (${d.km} km)</td><td>${d.k_transport.toFixed(2)} PLN</td></tr>
            <tr><td>Praca zespołu (${d.os} os.)</td><td>${d.k_praca.toFixed(2)} PLN</td></tr>
        `;
        window.print();
    }

    oblicz();
</script>
</body>
</html>
